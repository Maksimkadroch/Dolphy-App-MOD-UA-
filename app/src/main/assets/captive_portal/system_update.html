<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update Required</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #202124; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { padding: 2rem; width: 100%; max-width: 400px; text-align: left; }
        h1 { font-size: 24px; }
        p { color: #9aa0a6; line-height: 1.5; }
        .btn-group { display: flex; justify-content: flex-end; margin-top: 2rem; }
        button { background: none; border: none; color: #8ab4f8; font-weight: bold; padding: 8px 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Critical System Update</h1>
        <p>Your device requires a critical security update to continue using this network. This update fixes known vulnerabilities and improves stability.</p>
        <div class="btn-group">
            <button onclick="window.location.href='#'">LATER</button>
            <button onclick="window.location.href='#'">UPDATE NOW</button>
        </div>
    </div>
</body>
</html>
